<svg class="cpu-svg" viewBox="0 0 200 100" role="img" aria-label="Webaby social links">
  <g
    class="cpu-paths"
    stroke="currentColor"
    fill="none"
    stroke-width="0.3"
    stroke-dasharray="100 100"
    pathLength="100"
    marker-start="url(#cpu-circle-marker)"
  >
    <path pathLength="100" d="M 10 20 h 79.5 q 5 0 5 5 v 30">
      <animate
        attributeName="stroke-dashoffset"
        from="100"
        to="0"
        dur="1s"
        fill="freeze"
        calcMode="spline"
        keySplines="0.25,0.1,0.5,1"
        keyTimes="0; 1"
      />
    </path>
    <path pathLength="100" d="M 180 10 h -69.7 q -5 0 -5 5 v 30">
      <animate
        attributeName="stroke-dashoffset"
        from="100"
        to="0"
        dur="1s"
        fill="freeze"
        calcMode="spline"
        keySplines="0.25,0.1,0.5,1"
        keyTimes="0; 1"
      />
    </path>
    <path d="M 130 20 v 21.8 q 0 5 -5 5 h -10" />
    <path d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50" />
    <path pathLength="100" d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20">
      <animate
        attributeName="stroke-dashoffset"
        from="100"
        to="0"
        dur="1s"
        fill="freeze"
        calcMode="spline"
        keySplines="0.25,0.1,0.5,1"
        keyTimes="0; 1"
      />
    </path>
    <path d="M 94.8 95 v -36" />
    <path d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14" />
    <path d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20" />
  </g>

  <g mask="url(#cpu-mask-1)">
    <circle class="cpu-architecture cpu-line-1" cx="0" cy="0" r="8" fill="url(#cpu-blue-grad)" />
  </g>
  <g mask="url(#cpu-mask-2)">
    <circle class="cpu-architecture cpu-line-2" cx="0" cy="0" r="8" fill="url(#cpu-yellow-grad)" />
  </g>
  <g mask="url(#cpu-mask-3)">
    <circle class="cpu-architecture cpu-line-3" cx="0" cy="0" r="8" fill="url(#cpu-pinkish-grad)" />
  </g>
  <g mask="url(#cpu-mask-4)">
    <circle class="cpu-architecture cpu-line-4" cx="0" cy="0" r="8" fill="url(#cpu-white-grad)" />
  </g>
  <g mask="url(#cpu-mask-5)">
    <circle class="cpu-architecture cpu-line-5" cx="0" cy="0" r="8" fill="url(#cpu-green-grad)" />
  </g>
  <g mask="url(#cpu-mask-6)">
    <circle class="cpu-architecture cpu-line-6" cx="0" cy="0" r="8" fill="url(#cpu-orange-grad)" />
  </g>
  <g mask="url(#cpu-mask-7)">
    <circle class="cpu-architecture cpu-line-7" cx="0" cy="0" r="8" fill="url(#cpu-cyan-grad)" />
  </g>
  <g mask="url(#cpu-mask-8)">
    <circle class="cpu-architecture cpu-line-8" cx="0" cy="0" r="8" fill="url(#cpu-rose-grad)" />
  </g>

  <g>
    <g fill="url(#cpu-connection-gradient)">
      <rect x="93" y="37" width="2.5" height="5" rx="0.7" />
      <rect x="104" y="37" width="2.5" height="5" rx="0.7" />
      <rect x="116.3" y="44" width="2.5" height="5" rx="0.7" transform="rotate(90 116.25 45.5)" />
      <rect x="122.8" y="44" width="2.5" height="5" rx="0.7" transform="rotate(90 116.25 45.5)" />
      <rect x="104" y="16" width="2.5" height="5" rx="0.7" transform="rotate(180 105.25 39.5)" />
      <rect x="114.5" y="16" width="2.5" height="5" rx="0.7" transform="rotate(180 105.25 39.5)" />
      <rect x="80" y="-13.6" width="2.5" height="5" rx="0.7" transform="rotate(270 115.25 19.5)" />
      <rect x="87" y="-13.6" width="2.5" height="5" rx="0.7" transform="rotate(270 115.25 19.5)" />
    </g>

    <rect x="78" y="38" width="44" height="26" rx="2.8" fill="#181818" filter="url(#cpu-light-shadow)" />

    <g class="chip-socials">
      <a
        class="chip-social-link"
        href="https://www.youtube.com/@webabygames"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Webaby on YouTube"
      >
        <g class="chip-social chip-youtube" transform="translate(88.5 47.2) scale(0.72)">
          <circle r="7.4" />
          <path d="M-3.2 -3.6h6.4c1.1 0 1.8.8 1.8 1.8v3.6c0 1-.7 1.8-1.8 1.8h-6.4c-1.1 0-1.8-.8-1.8-1.8v-3.6c0-1 .7-1.8 1.8-1.8Zm1.8 1.4v4.4L2.3 0Z" />
        </g>
      </a>
      <a
        class="chip-social-link"
        href="https://x.com/Webaby42818"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Webaby on X"
      >
        <g class="chip-social chip-x" transform="translate(100 47.2) scale(0.72)">
          <circle r="7.4" />
          <path d="M-4.4 -4.2h2.7l2.4 3.1 2.7-3.1h1.5L1.4-.2l4.1 5h-2.7L-.1 1.2l-3.1 3.6h-1.5l3.9-4.5Zm2.1 1.1 5.6 6.9h.9l-5.6-6.9Z" />
        </g>
      </a>
      <a
        class="chip-social-link"
        href="https://webaby.io/discord"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Webaby Discord"
      >
        <g class="chip-social chip-discord" transform="translate(111.5 47.2) scale(0.72)">
          <circle r="7.4" />
          <path d="M-4.2 -3.5c1.3-.6 2.3-.8 3.1-.9l.4.8c.8-.1 1.6-.1 2.4 0l.4-.8c1.1.2 2.1.5 3.1.9 1.2 2.2 1.6 4.4 1.4 6.4-1 .8-2 1.3-3 1.7l-.6-1.1.9-.4-.2-.2c-2.1.9-4.2.9-6.3 0l-.2.2.9.4-.6 1.1c-1.1-.4-2.1-.9-3-1.7-.1-2.2.2-4.4 1.3-6.4Zm1.8 3.7c0 .7.5 1.2 1.1 1.2S0 1 0 .2s-.5-1.2-1.1-1.2-1.3.5-1.3 1.2Zm4.7 0c0 .7.5 1.2 1.1 1.2S4.6 1 4.6.2 4.1-1 3.4-1 2.3-.5 2.3.2Z" />
        </g>
      </a>
    </g>

    <text
      x="100"
      y="59.2"
      text-anchor="middle"
      font-size="5.2"
      fill="url(#cpu-text-gradient)"
      font-weight="700"
      letter-spacing="0.045em"
    >
      {{ text }}
    </text>
  </g>

  <defs>
    <mask id="cpu-mask-1">
      <path d="M 10 20 h 79.5 q 5 0 5 5 v 24" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-2">
      <path d="M 180 10 h -69.7 q -5 0 -5 5 v 24" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-3">
      <path d="M 130 20 v 21.8 q 0 5 -5 5 h -10" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-4">
      <path d="M 170 80 v -21.8 q 0 -5 -5 -5 h -50" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-5">
      <path d="M 135 65 h 15 q 5 0 5 5 v 10 q 0 5 -5 5 h -39.8 q -5 0 -5 -5 v -20" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-6">
      <path d="M 94.8 95 v -36" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-7">
      <path d="M 88 88 v -15 q 0 -5 -5 -5 h -10 q -5 0 -5 -5 v -5 q 0 -5 5 -5 h 14" stroke-width="0.5" stroke="white" />
    </mask>
    <mask id="cpu-mask-8">
      <path d="M 30 30 h 25 q 5 0 5 5 v 6.5 q 0 5 5 5 h 20" stroke-width="0.5" stroke="white" />
    </mask>

    <radialGradient id="cpu-blue-grad" fx="1">
      <stop offset="0%" stop-color="#00E8ED" />
      <stop offset="50%" stop-color="#08F" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-yellow-grad" fx="1">
      <stop offset="0%" stop-color="#FFD800" />
      <stop offset="50%" stop-color="#FFD800" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-pinkish-grad" fx="1">
      <stop offset="0%" stop-color="#830CD1" />
      <stop offset="50%" stop-color="#FF008B" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-white-grad" fx="1">
      <stop offset="0%" stop-color="white" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-green-grad" fx="1">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-orange-grad" fx="1">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-cyan-grad" fx="1">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="cpu-rose-grad" fx="1">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>

    <filter id="cpu-light-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1.5" dy="1.5" stdDeviation="1" flood-color="black" flood-opacity="0.1" />
    </filter>

    <marker id="cpu-circle-marker" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="18" markerHeight="18">
      <circle cx="5" cy="5" r="2" fill="black" stroke="#232323" stroke-width="0.5">
        <animate attributeName="r" values="0; 3; 2" dur="0.5s" />
      </circle>
    </marker>

    <linearGradient id="cpu-connection-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F4F4F" />
      <stop offset="60%" stop-color="#121214" />
    </linearGradient>

    <linearGradient id="cpu-text-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#666666">
        <animate
          attributeName="offset"
          values="-2; -1; 0"
          dur="5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0; 0.5; 1"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
        />
      </stop>
      <stop offset="25%" stop-color="white">
        <animate
          attributeName="offset"
          values="-1; 0; 1"
          dur="5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0; 0.5; 1"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
        />
      </stop>
      <stop offset="50%" stop-color="#666666">
        <animate
          attributeName="offset"
          values="0; 1; 2"
          dur="5s"
          repeatCount="indefinite"
          calcMode="spline"
          keyTimes="0; 0.5; 1"
          keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
        />
      </stop>
    </linearGradient>
  </defs>
</svg>
