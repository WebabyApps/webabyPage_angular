<!-- home.component.html -->
<span id="main"></span>
<app-hero></app-hero>

<main id="content">
  <section id="products" class="section">
    <div class="container">
      <h2>{{ 'home.sections.products.title' | transloco }}</h2>
      <app-products-carousel></app-products-carousel>
    </div>
  </section>

  <section id="blog" class="section alt blog-section">
    <app-shader-lines></app-shader-lines>
    <div class="container blog-section__content">
      <h2 class="blog-section__heading">
        <app-vapor-text
          class="blog-title-vapor"
          text="Webaby Blog"
          [minFont]="72"
          [maxFont]="132"
          [fontRatio]="0.13"
        ></app-vapor-text>
      </h2>
      <app-blog-teaser></app-blog-teaser>
    </div>
  </section>

  <section id="about" class="section alt">
    <div class="container">
      <h2>{{ 'home.about.title' | transloco }}</h2>
      <app-about></app-about>
    </div>
  </section>

  <section id="contact" class="section contact-section">
    <app-cpu-architecture class="contact-section__architecture" text="webaby"></app-cpu-architecture>
    <div class="container contact-section__content">
      <h2>{{ 'home.sections.contact.title' | transloco }}</h2>
      <app-contact></app-contact>
    </div>
  </section>
</main>
