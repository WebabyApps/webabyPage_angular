name: webaby-page runner (NEW on domain)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: webaby-page-prod
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      DEST_DIR: /var/www/webaby-page/current
      SSR_DIR: /opt/webaby-page/current
      SSR_PORT: "4000"
      SERVICE_NAME: webaby-ssr

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Build Angular SSR (browser + server)
        run: npm run build:ssr

      - name: Detect build output dirs
        shell: bash
        run: |
          set -e
          BROWSER_OUT=$(ls -d dist/*/browser 2>/dev/null || true)
          SERVER_OUT=$(ls -d dist/*/server 2>/dev/null || true)
          if [ -z "$BROWSER_OUT" ]; then echo "Brak dist/*/browser"; exit 1; fi
          if [ -z "$SERVER_OUT" ]; then echo "Brak dist/*/server"; exit 1; fi
          echo "BROWSER_OUT=$BROWSER_OUT" >> $GITHUB_ENV
          echo "SERVER_OUT=$SERVER_OUT" >> $GITHUB_ENV
          echo "browser: $BROWSER_OUT  |  server: $SERVER_OUT"

      # --- PWA (opcjonalnie) ---
      # - uses: actions/checkout@v4
      #   with:
      #     repository: maciejmar/basketball-game
      #     path: basketball-pwa
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: 22
      #     cache: 'npm'
      #     cache-dependency-path: basketball-pwa/package-lock.json
      # - name: Build PWA (/basketball-pwa)
      #   working-directory: basketball-pwa
      #   run: npx ng build --configuration production --base-href /basketball-pwa/ --deploy-url /basketball-pwa/
      # - name: Copy PWA into site's build
      #   shell: bash
      #   run: |
      #     PWA_DIR=$(ls -d basketball-pwa/dist/*/browser 2>/dev/null || ls -d basketball-pwa/dist/*)
      #     mkdir -p "$BROWSER_OUT/basketball-pwa"
      #     rsync -a --delete "$PWA_DIR/" "$BROWSER_OUT/basketball-pwa/"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: ssh-keyscan -Hv ${{ secrets.OVH_VPS_IP }} >> ~/.ssh/known_hosts

      - name: SSH smoke test
        run: ssh -o BatchMode=yes ubuntu@${{ secrets.OVH_VPS_IP }} "echo CONNECTED && hostname"

      - name: Create dest dirs
        run: |
          ssh ubuntu@${{ secrets.OVH_VPS_IP }} \
            "sudo mkdir -p '${{ env.DEST_DIR }}' && sudo mkdir -p '${{ env.SSR_DIR }}'"

      - name: Check server disk usage
        run: |
          ssh ubuntu@${{ secrets.OVH_VPS_IP }} "
            echo 'Disk usage:'; df -h / /var /var/www || true
            echo 'Largest /var folders:'; sudo du -xh /var --max-depth=1 2>/dev/null | sort -h | tail -10"

      - name: Rsync browser → $DEST_DIR
        run: |
          rsync -az --delete-before \
            --rsync-path="sudo rsync" \
            "${BROWSER_OUT}/" \
            ubuntu@${{ secrets.OVH_VPS_IP }}:"${{ env.DEST_DIR }}/"

      - name: Rsync server → $SSR_DIR
        run: |
          rsync -az --delete-before \
            --rsync-path="sudo rsync" \
            "${SERVER_OUT}/" \
            ubuntu@${{ secrets.OVH_VPS_IP }}:"${{ env.SSR_DIR }}/"

      - name: Fix permissions
        run: |
          ssh ubuntu@${{ secrets.OVH_VPS_IP }} "
            sudo find '${{ env.DEST_DIR }}' -type d -exec chmod 755 {} \;
            sudo find '${{ env.DEST_DIR }}' -type f -exec chmod 644 {} \;
            sudo chown -R root:root '${{ env.DEST_DIR }}'
            sudo find '${{ env.SSR_DIR }}' -type d -exec chmod 755 {} \;
            sudo find '${{ env.SSR_DIR }}' -type f -exec chmod 755 {} \;
            sudo chown -R ubuntu:ubuntu '${{ env.SSR_DIR }}'"

      - name: Create / update systemd service
        run: |
          ssh ubuntu@${{ secrets.OVH_VPS_IP }} '
            set -e
            # Zawsze użyj node 22 z nvm
            NODE_BIN=$(ls /home/ubuntu/.nvm/versions/node/v22.*/bin/node 2>/dev/null | tail -1)
            if [ -z "$NODE_BIN" ]; then
              echo "ERROR: nie znaleziono node v22 w nvm"; exit 1
            fi
            echo "Używam node: $NODE_BIN ($($NODE_BIN -v))"
          '
          # Zapisz ścieżkę node do użycia w heredoc
          NODE_PATH=$(ssh ubuntu@${{ secrets.OVH_VPS_IP }} \
            'ls /home/ubuntu/.nvm/versions/node/v22.*/bin/node 2>/dev/null | tail -1')
          ssh ubuntu@${{ secrets.OVH_VPS_IP }} "
            sudo tee /etc/systemd/system/${{ env.SERVICE_NAME }}.service > /dev/null << 'UNIT'
[Unit]
Description=Webaby Angular SSR
After=network.target

[Service]
Type=simple
User=ubuntu
WorkingDirectory=${{ env.SSR_DIR }}
ExecStart=${NODE_PATH} ${{ env.SSR_DIR }}/server.mjs
Restart=on-failure
RestartSec=5
Environment=NODE_ENV=production
Environment=PORT=${{ env.SSR_PORT }}

[Install]
WantedBy=multi-user.target
UNIT
            sudo systemctl daemon-reload
            sudo systemctl enable ${{ env.SERVICE_NAME }}
            sudo systemctl restart ${{ env.SERVICE_NAME }}
            sleep 2
            sudo systemctl is-active ${{ env.SERVICE_NAME }}"

      - name: Reload Nginx
        run: ssh ubuntu@${{ secrets.OVH_VPS_IP }} "sudo nginx -t && sudo systemctl reload nginx"
